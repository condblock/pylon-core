addon: "Rebar"

item:
  error_item:
    name: "<red>에러"
    lore: |-
      <red>로드가 실패된 블록에서 떨어진 아이템입니다.
      <red>오류가 난 블록:</red> <yellow>%block%

  guide:
    name: "<white>리바 가이드"
    lore: |-
      <arrow> <insn>오른쪽 클릭</insn>으로 열기
      <arrow> <insn>/py guide</insn> 명령어로 새 가이드 획득
      <arrow> <insn>/py</insn> 명령어로 아이템 없이 가이드 열기

  phantom_block:
    name: "<red>팬텀 블록 (%block%)"

  debug_waxed_weathered_cut_copper_stairs:
    name: "<red>디버그 밀랍칠한 녹슨 깎인 구리 계단"
    lore: |-
      <arrow> <insn>쉬프트 오른쪽 클릭</insn>으로 블록/엔티티 제거
      <arrow> <insn>오른쪽 클릭</insn>으로 블록/엔티티의 리바 데이터 확인

  fluid_pipe_intersection_marker:
    waila: "%pipe%"

  fluid_pipe_section_marker:
    waila: "%pipe%"

fluid:
  temperature:
    display-text: "<arrow> <attr>온도:</attr> %temperature%"
    cold: "<#1cb3d8>차가움"
    normal: "<#c9d81c>보통"
    hot: "<#d81c1c>뜨거움"

message:
  debug:
    not_a_block: "<red>리바 블록이 아닙니다"
    not_an_entity: "<red>리바 엔티티가 아닙니다"
    key:
      block: "<gold>리바 블록 키: <white>%key%"
      entity: "<gold>리바 엔티티 키: <white>%key%"
    ticking:
      ticking: "<gold>Ticking: <green>Yes"
      errored: "<gold>Ticking: <red>Ticker has errored"
      not_ticking: "<gold>Ticking: <red>No"
    data: "<gold>데이터: <white>%data%"
    deleted_data: "<red>%type% <gray>(%location%) <red>제거됨 <gray>(%location%)"

  pipe:
    connecting: "<insn>오른쪽 클릭</insn><gray>으로 설치, <insn>파이프 아이템 선택 해제</insn><gray>로 취소"
    cannot_place_here: "<red>여기에 파이프를 놓을 수 없습니다"
    not_enough_pipes: "<red>파이프가 충분하지 않습니다"
    not_of_same_type: "<red>파이프의 종류가 다릅니다"

  disabled:
    message: "<white>%item%<red>이(가) 비활성화되었습니다"
    lore: "<arrow> <#ff0000>비활성화됨 - 조합은 가능하지만 사용할 수 없습니다"

  research:
    unknown: "<red>%item%을(를) 사용하는 방법을 알 수 없습니다. %research%에 대해 연구해 보세요."
    unlocked: "<green>%research%에 대한 연구를 마쳤습니다"
    click_to_research: "<green>클릭해서 연구 (%points% 포인트)"

  command:
    error:
      no_permission: "<red>이 명령어를 사용할 권한이 없습니다"
      must_be_player: "<red>플레이어만 이 명령어를 사용할 수 있습니다"
    key:
      hover: "클릭해서 클립보드에 복사"
      no_item: "<red>파일론 아이템을 들고 있지 않습니다"
    waila:
      enabled: "<green>WAILA 활성화"
      disabled: "<red>WAILA 비활성화"
    gametest:
      started: "%location% 에서 %test% 테스트를 실행합니다"
      failed: "<red>%test% 테스트 실패: %reason%"
      success: "<green>%test% 테스트 성공"
    research:
      added: "%player%에게 연구 %research%을(를) 추가했습니다"
      removed: "%player%에게 연구 %research%을(를) 제거했습니다"
      list:
        none_self: "<red>해금한 연구가 없습니다"
        none_other: "<red>%player%가 해금한 연구가 없습니다"
        discovered_self: "%count%개의 연구를 해금하였습니다: %list%"
        discovered_other: "%player%는 %count%개의 연구를 해금하였습니다: %list%"
      already_discovered: "<red>이미 %research%에 대한 연구를 마쳤습니다"
      cannot_unlock: "<red>연구 포인트로 %research%을(를) 해금할 수 없습니다"
      not_enough_points: "<red>%research% 연구를 위한 지식이 모자랍니다 (%points%/%cost% 포인트)"
      points:
        set: "%player%의 연구 포인트를 %points%로 설정하였습니다"
        added: "%player%의 연구 포인트를 %points% 추가했습니다"
        removed: "%player%의 연구 포인트를 %points% 제거했습니다"
        query: "%player%의 연구 포인트: %points%"
    exposerecipe:
      not-configurable: "<red>조합법를 설정할 수 없습니다"
      warning: "<yellow>주의: 조합법 구성을 노출하면 자동으로 업데이트되지 않습니다. 되돌리려면 %file%을 삭제하세요"
    finishmultiblock:
      failed: "<red>멀티블록을 바라보고 있지 않습니다"
      success: "멀티블록 완성됨"
    forceload: "청크 %x%, %z% 강제 로딩 중"

  waila:
    type-disabled: "<red>이 서버는 더 이상 이전에 설정한 %type% WAILA 표시 유형을 허용하지 않습니다. 기본값으로 재설정되었습니다."

gui:
  scroll:
    up: "위로 스크롤"
    down: "아래로 스크롤"
    left: "왼쪽으로 스크롤"
    right: "오른쪽으로 스크롤"

  page:
    next: "다음 페이지 (%current%/%total%)"
    previous: "이전 페이지 (%current%/%total%)"

  time_left: "<arrow> 남은 시간: %time%"
  input: "입력"
  output: "출력"

guide:
  title: "리바 가이드"
  button:
    back:
      name: "<yellow>뒤로"
    item-recipes: "<white>조합법"
    machine-recipes: "<white>기계를 사용하는 조합법"
    search-specifiers:
      name: "검색 지정자"
      lore: |-
        <guidearrow> 기본적으로 정확한 이름만을 검색합니다 ("철 주괴"는 "철"과 "주괴"가 아닌 "철 주괴"만을 검색합니다)
        <guidearrow> 접두사 <light_purple>@</light_purple>는 <light_purple>애드온</light_purple>의 id나 표기되는 이름을 검색합니다. 예시) "pylon"
        <guidearrow> 접두사 <aqua>$</aqua>는 아이템의 <aqua>설명</aqua>을 검색합니다
        <guidearrow> 접두사 검색은 접두사 바로 뒤에 있는 단어에만 적용됩니다
        <guidearrow> 예시) <light_purple>@pylon <white>철 <aqua>$온도 <white>슬러리
    research:
      cost:
        not-enough: "<arrow> <attr>해금 비용:</attr> <#e23b28>%player_points%/%unlock_cost%"
        enough: "<arrow> <attr>해금 비용:</attr> <#61ea38>%player_points%/%unlock_cost%"
        researched: "<arrow> <attr>해금 비용:</attr> <#61ea38>%unlock_cost% (연구됨)"
      hints:
        researched: |-
          
          <u>도움말</u>
          <guidearrow> <guideinsn>오른쪽 클릭</guideinsn>으로 해금되는 아이템 보기
        unresearched: |-
          
          <u>도움말</u>
          <guidearrow> <guideinsn>왼쪽 클릭</guideinsn>으로 연구
          <guidearrow> <guideinsn>오른쪽 클릭</guideinsn>으로 해금되는 아이템 보기
      unlocks-title: |-
      
        <u>해금되는 아이템</u>
      unlocks-item: "<diamond> <white>%item%"
      more-researches: "<diamond> <gray>외 <aqua>%amount%<gray>개 - <guideinsn>오른쪽 클릭</guideinsn> <gray>으로 모두 보기"
      error: "연구 로드 실패"
    fluid:
      name: "%fluid% <gray>(%amount%<gray>)"
      error: "<red>유체 아이템 로드 실패"
    item:
      not-researched:
        no-research-cost: "<guidearrow> <red>연구되지 않음"
        enough-points: "<guidearrow> <red>연구되지 않음 <gray>(%research_name% <gray>| <#61ea38>%player_points%/%unlock_cost%<gray>)"
        not-enough-points: "<guidearrow> <red>연구되지 않음 <gray>(%research_name% <gray>| <#e23b28>%player_points%/%unlock_cost%<gray>)"

      hints:
        unresearched: |-
          
          <u>도움말</u>
          <guidearrow> <guideinsn>쉬프트 왼쪽 클릭</guideinsn>으로 연구
      error: "<red>아이템 로드 실패"
      amount: "%name%: <gray>%amount%%breakdown%"
      amount-breakdown: " (%stacks%x%stack-size% + %remainder%)"
    toggle-waila:
      enabled:
        name: "<white>WAILA: <green>활성화됨 <dark_gray>(클릭해서 전환)"
        lore: "<guidearrow> WAILA는 바라보고 있는 리바 블록의 정보를 표시합니다"
      disabled:
        name: "<white>WAILA: <red>비활성화됨 <dark_gray>(클릭해서 전환)"
        lore: "<guidearrow> WAILA는 바라보고 있는 리바 블록의 정보를 표시합니다"
    toggle-vanilla-waila:
      enabled:
        name: "<white>바닐라 WAILA: <green>활성화됨 <dark_gray>(클릭해서 전환)"
        lore: "<arrow> WAILA가 바닐라의 블록/엔티티 정보를 표시하도록 합니다"
      disabled:
        name: "<white>바닐라 WAILA: <red>비활성화됨 <dark_gray>(클릭해서 전환)"
        lore: "<arrow> WAILA가 바닐라의 블록/엔티티 정보를 표시하도록 합니다"
    cycle-waila-type:
      bossbar:
        name: "<white>WAILA 표시 방식: <green>보스바 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> WAILA의 표시 위치를 선택합니다
          <guidearrow> <green>보스바 <dark_gray>- <gray>화면 상단에 표시됩니다
          <guidearrow> <aqua>액션바 <dark_gray>- <gray>화면 하단에 표시됩니다
      actionbar:
        name: "<white>WAILA 표시 방식: <aqua>액션바 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> WAILA의 표시 위치를 선택합니다
          <guidearrow> <green>보스바 <dark_gray>- <gray>화면 상단에 표시됩니다
          <guidearrow> <aqua>액션바 <dark_gray>- <gray>화면 하단에 표시됩니다
    toggle-block-culling:
      enabled:
        name: "<white>블록 컬링: <green>활성화 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 파일론 블록 텍스처를 추가하는 리소스 팩이 있는 경우, 이를 사용할 수 있도록 활성화하세요
          <guidearrow> <red>경고:</red> 파일론 블록이 많을 경우 게임의 성능에 나쁜 영향을 미칠 수 있습니다
          <guidearrow> 해당 설정이 활성화된 경우 블록 텍스처 엔티티도 함께 컬링됩니다.
      disabled:
        name: "<gray>블록 컬링: <red>비활성화 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 파일론 블록 텍스처를 추가하는 리소스 팩이 있는 경우, 이를 사용할 수 있도록 활성화하세요
          <guidearrow> <red>경고:</red> 파일론 블록이 많을 경우 게임의 성능에 나쁜 영향을 미칠 수 있습니다
          <guidearrow>  해당 설정이 활성화된 경우 블록 텍스처 엔티티도 함께 컬링됩니다.
    cycle-culling-preset:
      disabled:
        name: "<white>컬링 프리셋: <aqua>비활성화 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 시야에 들어오지 않는 블록 텍스쳐를 숨기는 정도를 바꿉니다
          <guidearrow> 더 높은 컬링 설정은 일반적으로 성능을 향상시킬 수 있습니다.
          <guidearrow> <aqua>(비활성화) <gray>시야 거리 내의 모든 블록 텍스쳐가 표시됩니다
      custom:
        name: "<white>컬링 프리셋: <light_purple>사용자 지정 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 블록 컬링의 강도를 변경합니다
          <guidearrow> 더 강한 컬링 설정은 일반적으로 게임의 성능을 향상시킵니다
          <guidearrow> <light_purple>(사용자 지정) <gray>고급 컬링 설정에 따라 컬링이 결정됩니다
      low:
        name: "<white>컬링 프리셋: <green>낮음 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 시야에 들어오지 않는 블록의 텍스쳐를 숨기는 정도를 바꿉니다
          <guidearrow> 더 높은 컬링 설정은 일반적으로 성능을 향상시킬 수 있습니다.
          <guidearrow> <green>(낮음) <yellow>%alwaysShowRadius%블록</yellow><gray> 이내의 블록 텍스쳐를 모두 표시합니다
          <guidearrow> <green>(낮음) <yellow>%alwaysShowRadius%블록에서 %cullRadius%블록</yellow> 내의 블록 텍스쳐를 보수적으로 컬링합니다
          <guidearrow> <green>(낮음) <gray>시야와 블록 텍스쳐 사이의 거리가 <yellow>%maxOccludingCount%블록</yellow> 이상인 경우에만 컬링합니다
      medium:
        name: "<white>컬링 프리셋: <yellow>보통 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 시야에 들어오지 않는 블록의 텍스쳐를 숨기는 정도를 바꿉니다
          <guidearrow> 더 높은 컬링 설정은 일반적으로 성능을 향상시킬 수 있습니다.
          <guidearrow> <yellow>(보통) <yellow>%alwaysShowRadius%블록</yellow><gray> 이내의 블록 텍스쳐를 모두 표시합니다
          <guidearrow> <yellow>(보통) <yellow>%alwaysShowRadius%블록에서 %cullRadius%블록</yellow> 내의 블록 텍스쳐를 적당히 컬링합니다
          <guidearrow> <yellow>(보통) <gray>시야와 블록 텍스쳐 사이의 거리가 <yellow>%maxOccludingCount%블록</yellow> 이상인 경우에만 컬링합니다
      high:
        name: "<white>컬링 프리셋: <red>높음 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 시야에 들어오지 않는 블록의 텍스쳐를 숨기는 정도를 바꿉니다
          <guidearrow> 더 높은 컬링 설정은 일반적으로 성능을 향상시킬 수 있습니다.
          <guidearrow> <red>(높음) <yellow>%alwaysShowRadius%블록</yellow><gray> 이내의 블록 텍스쳐를 모두 표시합니다
          <guidearrow> <red>(높음) <yellow>%alwaysShowRadius%블록에서 %cullRadius%블록</yellow> 내의 블록 텍스쳐를 공격적으로 컬링합니다
          <guidearrow> <red>(높음) <gray>시야와 블록 텍스쳐 사이의 거리가 <yellow>%maxOccludingCount%블록</yellow> 이상인 경우에만 컬링합니다
    culling-update-interval:
        name: "<white>컬링 업데이트 간격: <yellow>%value%틱"
        lore: |-
            <guidearrow> 리바가 컬링 로직을 실행하는 빈도를 설정합니다 (20틱 = 1초)
            <guidearrow> 높은 값은 서버 성능을 향상시킬 수 있지만 컬링이 지연되는 현상을 유발할 수 있습니다
            <guidearrow> <guideinsn>왼쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 증가
            <guidearrow> <guideinsn>오른쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 감소
            <guidearrow> <guideinsn>쉬프트 클릭</guideinsn>으로 <yellow>%shift_step%</yellow> 증가/감소
            <guidearrow> 최소: <yellow>%min%</yellow>
            <guidearrow> 최대: <yellow>%max%</yellow>
    culling-hidden-interval:
        name: "<white>숨겨진 엔티티 확인 간격: <yellow>%value%번마다"
        lore: |-
            <guidearrow> 얼마나 자주(업데이트 X번마다) 숨겨진 엔티티에 대한 레이 트레이싱 컬링을 수행할지 설정합니다
            <guidearrow> 낮은 값은 숨겨진 후 엔티티가 더 빠르게 보이도록 하지만 더 자주 확인해야 합니다
            <guidearrow> <guideinsn>왼쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 증가
            <guidearrow> <guideinsn>오른쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 감소
            <guidearrow> <guideinsn>쉬프트 클릭</guideinsn>으로 <yellow>%shift_step%</yellow> 증가/감소
            <guidearrow> 최소: <yellow>%min%</yellow>
            <guidearrow> 최대: <yellow>%max%</yellow>
    culling-visible-interval:
        name: "<white>보이는 엔티티 확인 간격: <yellow>%value%번마다"
        lore: |-
            <guidearrow> 얼마나 자주(업데이트 X번마다) 보이는 엔티티에 대한 레이 트레이싱 컬링을 수행할지 설정합니다
            <guidearrow> 낮은 값은 엔티티가 가려졌을 때 더 빠르게 숨겨지도록 하지만 더 자주 확인해야 합니다
            <guidearrow> 높은 값은 클라이언트 성능에 거의 영향을 주지 않으므로 권장됩니다
            <guidearrow> <guideinsn>왼쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 증가
            <guidearrow> <guideinsn>오른쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 감소
            <guidearrow> <guideinsn>쉬프트 클릭</guideinsn>으로 <yellow>%shift_step%</yellow> 증가/감소
            <guidearrow> 최소: <yellow>%min%</yellow>
            <guidearrow> 최대: <yellow>%max%</yellow>
    culling-always-show-radius:
        name: "<white>상시 표시 반경: <yellow>%value%블록"
        lore: |-
            <guidearrow> 플레이어에게 반경 내의 엔티티를 항상 전송합니다
            <guidearrow> 반경 내의 엔티티는 컬링 확인 없이 항상 표시됩니다
            <guidearrow> <guideinsn>왼쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 증가
            <guidearrow> <guideinsn>오른쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 감소
            <guidearrow> <guideinsn>쉬프트 클릭</guideinsn>으로 <yellow>%shift_step%</yellow> 증가/감소
            <guidearrow> 최소: <yellow>%min%</yellow>
            <guidearrow> 최대: <yellow>%max%</yellow>
    culling-cull-radius:
        name: "<white>컬링 반경: <yellow>%value%블록"
        lore: |-
            <guidearrow> 플레이어 반경 내의 엔티티를 컬링할 지 확인합니다
            <guidearrow> 이 반경 밖의 엔티티는 자동으로 숨겨집니다
            <guidearrow> <guideinsn>왼쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 증가
            <guidearrow> <guideinsn>오른쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 감소
            <guidearrow> <guideinsn>쉬프트 클릭</guideinsn>으로 <yellow>%shift_step%</yellow> 증가/감소
            <guidearrow> 최소: <yellow>%min%</yellow>
            <guidearrow> 최대: <yellow>%max%</yellow>
    culling-max-occluding-count:
        name: "<white>최대 가려진 블록 수: <yellow>%value% 블록"
        lore: |-
            <guidearrow> 플레이어의 눈과 엔티티 사이에 있는 가려진 블록의 최대 수입니다
            <guidearrow> 낮은 값은 강하게 컬링하고, 높은 값은 약하게 컬링합니다
            <guidearrow> <guideinsn>왼쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 증가
            <guidearrow> <guideinsn>오른쪽 클릭</guideinsn>으로 <yellow>%step%</yellow> 감소
            <guidearrow> <guideinsn>쉬프트 클릭</guideinsn>으로 <yellow>%shift_step%</yellow> 증가/감소
            <guidearrow> 최소: <yellow>%min%</yellow>
            <guidearrow> 최대: <yellow>%max%</yellow>
    toggle-armor-textures:
      enabled:
        name: "<white>커스텀 갑옷 텍스쳐: <green>활성화 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 사용자 지정 갑옷 텍스쳐를 추가하는 리소스팩을 사용 중인 경우에만 활성화하세요
          <guidearrow> 이 설정은 <bold>장비</bold>했을 때의 갑옷 텍스쳐에 적용됩니다 - 인벤토리에 표시되는 텍스쳐가 아닙니다
      disabled:
        name: "<white>커스텀 갑옷 텍스쳐: <red>비활성화 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 사용자 지정 갑옷 텍스쳐를 추가하는 리소스팩을 사용 중인 경우에만 활성화하세요
          <guidearrow> 이 설정은 <bold>장비</bold>했을 때의 갑옷 텍스쳐에 적용됩니다 - 인벤토리에 표시되는 텍스쳐가 아닙니다
    toggle-block-textures:
      enabled:
        name: "<white>커스텀 블록 텍스쳐: <green>활성화 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 리바 블록에 텍스쳐를 추가하는 리소스팩을 사용 중인 경우에만 활성화하세요
          <guidearrow> <red>경고:</red> 이 설정은 많은 수의 리바 블록이 있는 경우 게임 성능에 부정적인 영향을 줄 수 있습니다
      disabled:
        name: "<white>커스텀 블록 텍스쳐: <red>비활성화 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 리바 블록에 텍스쳐를 추가하는 리소스팩을 사용 중인 경우에만 활성화하세요
          <guidearrow> <red>경고:</red> 이 설정은 많은 수의 리바 블록이 있는 경우 게임 성능에 부정적인 영향을 줄 수 있습니다
    toggle-research-confetti:
      enabled:
        name: "<white>연구 축하 폭죽: <green>활성화 <dark_gray>(클릭해서 전환)"
        lore: "<guidearrow> 새 연구를 해금했을 때 축하 폭죽을 터트리려면 활성화하세요"
      disabled:
        name: "<white>연구 축하 폭죽: <red>비활성화 <dark_gray>(클릭해서 전환)"
        lore: "<guidearrow> 새 연구를 해금했을 때 축하 폭죽을 터트리려면 활성화하세요"
    toggle-research-sounds:
      enabled:
        name: "<white>연구 효과음: <green>활성화 <dark_gray>(클릭해서 전환)"
        lore: "<guidearrow> 연구가 진행될 때 소리를 재생하려면 활성화하세요"
      disabled:
        name: "<white>연구 효과음: <red>비활성화 <dark_gray>(클릭해서 전환)"
        lore: "<guidearrow> 연구가 진행될 때 소리를 재생하려면 활성화하세요"
    toggle-guide-hints:
      enabled:
        name: "<white>가이드 도움말: <green>활성화 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 가이드 내부의 <guideinsn>도움말</guideinsn> 표시 여부
      disabled:
        name: "<white>가이드 도움말: <red>비활성화 <dark_gray>(클릭해서 전환)"
        lore: |-
          <guidearrow> 가이드 내부의 <guideinsn>도움말</guideinsn> 표시 여부
    info:
      discord:
        name: "<white>디스코드"
        lore: |-
          <guidearrow> <guideinsn>클릭</guideinsn>해서 공식 리바 디스코드 서버 링크 받기
        message: "클릭해서 공식 리바 디스코드 서버 링크를 여세요!"
      rebar_setup:
        name: "<white>리바 설치"
        lore: |-
          <guidearrow> <guideinsn>클릭</guideinsn>해서 리바 설치 가이드 링크 받기
        message: "클릭해서 리바 설치 가이드를 여세요!"
      rebar_addons:
        name: "<white>리바 애드온"
        lore: |-
          <guidearrow> <guideinsn>클릭</guideinsn>해서 공식 리바 애드온 목록 링크 받기
        message: "클릭해서 공식 리바 애드온 목록을 여세요!"
      cheat_controls:
        name: "<white>가이드 치트 조작"
        lore: |-
          <guidearrow> 관리자 권한으로 리바 가이드에서 치트 조작을 사용할 수 있습니다
          <guidearrow> <guideinsn>아이템 버리기(Q)</guideinsn>로 리바 아이템을 한 개 얻습니다
          <guidearrow> <guideinsn>마우스 휠 버튼 클릭</guideinsn>으로 리바 아이템을 한 스택 얻습니다
      rebar:
        name: "<white>리바란?"
        lore: |-
          <guidearrow> 리바는 사용자 지정 블록, 아이템, 엔티티 등을 추가하는 마인크래프트 플러그인 프레임워크입니다
          <guidearrow> 리바 자체는 이 가이드와 백엔드 시스템만 제공하며, 애드온(예: 파일론)이 모든 콘텐츠를 제공합니다
      guide_controls:
        name: "<white>가이드 조작"
        lore: |-
          <u>아이템/유체 버튼</u>
          <guidearrow> <guideinsn>왼쪽 클릭</guideinsn>으로 조합법 보기
          <guidearrow> <guideinsn>오른쪽 클릭</guideinsn>으로 사용법 보기
          <guidearrow> <guideinsn>쉬프트 오른쪽 클릭</guideinsn>으로 연구 열기 (해당 연구가 있는 경우)
          
          <u>뒤로가기 버튼</u>
          <guidearrow> <guideinsn>클릭</guideinsn>으로 한 페이지 뒤로 이동
          <guidearrow> <guideinsn>쉬프트 왼쪽 클릭</guideinsn>으로 메인 메뉴로 이동
      settings:
        name: "<white>가이드 설정"
        lore: |-
          <guidearrow> 메인 페이지의 왼쪽 상단에 설정이 있습니다
          <guidearrow> 설정에는 WAILA, 블록 컬링, 리소스 팩 설정 등 다양한 옵션이 포함되어 있습니다
          
          <guidearrow> <guideinsn>클릭</guideinsn>으로 설정 페이지 열기
      researches:
        name: "<white>연구"
        lore: |-
          <guidearrow> 리바 아이템/블록 잠겨 있을 수 있고, 가이드에서 표시되는 연구를 해금해야 합니다
          <guidearrow> 기본적으로 연구는 연구 포인트를 소모하여 해금되며, 애드온을 통해 포인트를 얻는 방법을 추가할 수 있습니다
          <guidearrow> 연구를 해금하지 않으면 해당 연구에 포함된 아이템/블록을 사용할 수 없습니다
